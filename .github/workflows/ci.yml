name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build:dashboard

      - name: Build Storybook
        if: matrix.node-version == 22
        run: npm run build:storybook

      - name: Verify
        run: npm run verify

  terminal-package:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tui/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix tui

      - name: Build packaged terminal binaries
        run: |
          npm run build:dashboard
          npm run build:tui
          npm run build:catalog:tui

      - name: Fast terminal verification
        run: npm run verify:fast

      - name: Verify installed current-host package
        run: |
          npm run verify:package
          npm run test:global-install
