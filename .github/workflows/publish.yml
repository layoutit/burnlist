name: Publish

# Manual-only. Bumps the package version (patch/minor/major), gates it, publishes to
# npm after committing the version bump, then pushes a `v<X.Y.Z>` tag back to main.
#
# Trigger from the Actions tab ("Run workflow") or:
#   gh workflow run publish.yml -f bump=patch
# Requires an `NPM_TOKEN` repository secret with publish rights.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Refuse to publish from a non-main ref
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Publish must run from main; got ${GITHUB_REF}."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Gate — build, verify, package
        run: |
          npm run build:dashboard
          npm run verify
          npm run verify:package

      - name: Determine release action
        id: release-state
        run: |
          set -euo pipefail
          current="$(node -p "require('./package.json').version")"
          tag="v${current}"
          if ! npm view "burnlist@${current}" version >/dev/null 2>&1; then
            action=publish
          elif ! git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            action=tag
          else
            action=bump
          fi
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "action=${action}" >> "$GITHUB_OUTPUT"
          echo "Release action: ${action} (${tag})"

      - name: Bump version
        id: bump
        if: steps.release-state.outputs.action == 'bump'
        run: |
          set -euo pipefail
          next="$(npm version "${{ inputs.bump }}" --no-git-tag-version)"
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${next}"

      - name: Set release version
        id: release
        env:
          ACTION: ${{ steps.release-state.outputs.action }}
          CURRENT_VERSION: ${{ steps.release-state.outputs.current }}
          BUMPED_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          version="v${CURRENT_VERSION}"
          if [[ "$ACTION" == "bump" ]]; then version="$BUMPED_VERSION"; fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Record only a new bump. Reruns publish or tag the recorded version instead.
      - name: Commit and push version bump
        if: steps.release-state.outputs.action == 'bump'
        env:
          NEXT_VERSION: ${{ steps.release.outputs.version }}
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          set -euo pipefail
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${NEXT_VERSION}"
          git push origin HEAD:main

      - name: Publish to npm
        if: steps.release-state.outputs.action != 'tag'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag published release
        env:
          NEXT_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${NEXT_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${NEXT_VERSION} already exists; skipping."
            exit 0
          fi
          git tag "${NEXT_VERSION}"
          git push origin "${NEXT_VERSION}"
